<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password - Global Immigration SC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #E30613;
            --primary-red-dark: #b30000;
            --dark-gray: #333333;
            --medium-gray: #777777;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
        }

        .reset-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-header img {
            max-width: 100px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .reset-header h2 {
            color: white;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        .reset-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: white;
            font-size: 0.9rem;
        }

        .form-group label i {
            color: var(--primary-red);
            margin-right: 5px;
        }

        .form-group label .required {
            color: var(--primary-red);
        }

        .glass-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            font-size: 1rem;
            transition: all 0.3s ease;
            color: var(--dark-gray);
        }

        .glass-input:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.15);
        }

        .glass-input::placeholder {
            color: #999;
        }

        .password-strength {
            margin-top: 8px;
        }

        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .strength-text {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .strength-weak .strength-fill { background: #dc3545; width: 33%; }
        .strength-medium .strength-fill { background: #ffc107; width: 66%; }
        .strength-strong .strength-fill { background: #28a745; width: 100%; }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--primary-red);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            background: var(--primary-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(227, 6, 19, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(227, 6, 19, 0.15);
            border-left: 3px solid var(--primary-red);
            color: var(--primary-red);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
            align-items: center;
            gap: 10px;
        }

        .error-message i {
            font-size: 1rem;
        }

        .success-message {
            background: rgba(40, 167, 69, 0.15);
            border-left: 3px solid #28a745;
            color: #28a745;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
            align-items: center;
            gap: 10px;
        }

        .success-message i {
            font-size: 1rem;
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-footer p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .form-footer a {
            color: var(--primary-red);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .form-footer .back-home {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .form-footer .back-home:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .form-footer-copyright {
            margin-top: 12px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 550px) {
            .reset-container { padding: 25px; }
            .reset-header h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <img src="../GISC-LOGO.webp" alt="Global Immigration SC Logo" onerror="this.src='https://placehold.co/100x100/E30613/white?text=GISC'">
            <h2>Create New Password</h2>
            <p>Enter your new password below</p>
        </div>

        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label><i class="fas fa-lock"></i> New Password <span class="required">*</span></label>
                <input type="password" id="password" class="glass-input" placeholder="Create a strong password" required minlength="6">
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar">
                        <div class="strength-fill"></div>
                    </div>
                    <div class="strength-text"></div>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> Confirm Password <span class="required">*</span></label>
                <input type="password" id="confirmPassword" class="glass-input" placeholder="Confirm your new password" required>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                <i class="fas fa-key"></i> Reset Password
            </button>
        </form>

        <div class="form-footer">
            <p><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
            <p style="margin-top: 8px;">
                <a href="../index.html" class="back-home">← Back to Home</a>
            </p>
            <p class="form-footer-copyright">© 2024 Global Immigration SC</p>
        </div>
    </div>

    <script>
        // ============================================================
        // API URL
        // ============================================================
        const API_URL = 'https://gisc-app-production.up.railway.app/api';

        // ============================================================
        // GET TOKEN FROM URL
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');

        if (!resetToken) {
            document.getElementById('errorText').textContent = 'Invalid or missing reset token. Please request a new reset link.';
            document.getElementById('errorMessage').style.display = 'flex';
            document.getElementById('submitBtn').disabled = true;
        }

        // ============================================================
        // DOM ELEMENTS
        // ============================================================
        const resetForm = document.getElementById('resetForm');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successDiv = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const strengthDiv = document.getElementById('passwordStrength');

        // ============================================================
        // PASSWORD STRENGTH CHECKER
        // ============================================================
        function checkPasswordStrength(password) {
            if (!password) {
                strengthDiv.className = 'password-strength';
                strengthDiv.querySelector('.strength-text').textContent = '';
                return;
            }

            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z\d]/.test(password)) strength++;

            strengthDiv.classList.remove('strength-weak', 'strength-medium', 'strength-strong');

            if (strength <= 2) {
                strengthDiv.classList.add('strength-weak');
                strengthDiv.querySelector('.strength-text').textContent = 'Weak password';
                strengthDiv.querySelector('.strength-text').style.color = '#dc3545';
            } else if (strength <= 4) {
                strengthDiv.classList.add('strength-medium');
                strengthDiv.querySelector('.strength-text').textContent = 'Medium password';
                strengthDiv.querySelector('.strength-text').style.color = '#ffc107';
            } else {
                strengthDiv.classList.add('strength-strong');
                strengthDiv.querySelector('.strength-text').textContent = 'Strong password';
                strengthDiv.querySelector('.strength-text').style.color = '#28a745';
            }
        }

        passwordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });

        // ============================================================
        // PASSWORD MATCH VALIDATION
        // ============================================================
        function validatePasswordMatch() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            if (confirm && password !== confirm) {
                confirmInput.style.borderColor = '#dc3545';
                return false;
            } else {
                confirmInput.style.borderColor = 'rgba(255, 255, 255, 0.4)';
                return true;
            }
        }

        confirmInput.addEventListener('input', validatePasswordMatch);
        passwordInput.addEventListener('input', validatePasswordMatch);

        // ============================================================
        // RESET PASSWORD FORM SUBMISSION
        // ============================================================
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value;
            const confirm = confirmInput.value;

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!password || password.length < 6) {
                errorText.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'flex';
                return;
            }

            if (password !== confirm) {
                errorText.textContent = 'Passwords do not match';
                errorDiv.style.display = 'flex';
                return;
            }

            if (!resetToken) {
                errorText.textContent = 'Invalid reset token. Please request a new reset link.';
                errorDiv.style.display = 'flex';
                return;
            }

            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner"></span> Resetting...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/users/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        newPassword: password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to reset password');
                }

                successText.textContent = 'Password reset successfully! Redirecting to login...';
                successDiv.style.display = 'flex';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);

            } catch (error) {
                errorText.textContent = error.message || 'Failed to reset password. Please try again.';
                errorDiv.style.display = 'flex';

                // If token expired, offer to resend
                if (error.message.includes('expired') || error.message.includes('invalid')) {
                    errorDiv.innerHTML += `
                        <p style="margin-top: 10px;">
                            <a href="forgot-password.html" style="color: #E30613; font-weight: 600;">Click here to request a new reset link</a>
                        </p>
                    `;
                }

            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        confirmInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                resetForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
