<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Global Immigration SC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #E30613;
            --primary-red-dark: #b30000;
            --primary-white: #FFFFFF;
            --dark-gray: #333333;
            --medium-gray: #777777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header img {
            max-width: 120px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .login-header h2 {
            color: white;
            margin-bottom: 5px;
            font-size: 1.6rem;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: white;
            font-size: 0.9rem;
        }

        .form-group label i {
            color: var(--primary-red);
            margin-right: 5px;
        }

        .glass-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            font-size: 1rem;
            transition: all 0.3s ease;
            color: var(--dark-gray);
        }

        .glass-input:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.15);
        }

        .glass-input::placeholder {
            color: #999;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-red);
            cursor: pointer;
        }

        .form-options a {
            color: var(--primary-red);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s ease;
        }

        .form-options a:hover {
            color: #ff4444;
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--primary-red);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            background: var(--primary-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(227, 6, 19, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(227, 6, 19, 0.15);
            border-left: 3px solid var(--primary-red);
            color: var(--primary-red);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
        }

        .error-message i {
            margin-right: 8px;
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-footer p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .login-footer a {
            color: var(--primary-red);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: #ff4444;
            text-decoration: underline;
        }

        .login-footer .back-home {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .login-footer .back-home:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 550px) {
            .login-container {
                padding: 25px;
            }
            
            .login-header h2 {
                font-size: 1.3rem;
            }
            
            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="../GISC-LOGO.webp" alt="Global Immigration SC Logo" onerror="this.src='https://placehold.co/120x120/E30613/white?text=GISC'">
            <h2>Welcome Back</h2>
            <p>Login to access your immigration portal</p>
        </div>
        
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText">Invalid email or password</span>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" class="glass-input" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" class="glass-input" placeholder="••••••••" required>
            </div>
            
            <div class="form-options">
                <label>
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a href="forgot-password.html">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn-primary" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login to Dashboard
            </button>
        </form>
        
        <div class="login-footer">
            <p>Don't have an account? <a href="register.html">Create Account</a></p>
            <p style="margin-top: 8px;">
                <a href="../index.html" class="back-home">← Back to Home</a>
            </p>
            <p style="margin-top: 12px; font-size: 0.7rem; color: rgba(255,255,255,0.3);">
                © 2024 Global Immigration SC
            </p>
        </div>
    </div>
    
        <!-- ============ ANTI-CONSOLE & SECURITY PROTECTION ============ -->
    <script>
        // ============================================================
        // ANTI-CONSOLE PROTECTION - Prevents hackers from using DevTools
        // ============================================================
        
        // 1. Disable right-click context menu
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // 2. Disable common keyboard shortcuts for DevTools
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I (Inspect)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+J (Console)
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+U (View Source)
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+S (Save Page)
            if (e.ctrlKey && (e.key === 'S' || e.key === 's')) {
                e.preventDefault();
                return false;
            }
        });

        // 3. Disable console.log, console.warn, console.error - but keep for debugging
        // Only disable in production to prevent hackers from seeing sensitive info
        if (window.location.hostname !== 'localhost' && !window.location.hostname.includes('127.0.0.1')) {
            // Store original console methods
            const originalConsole = {
                log: console.log,
                warn: console.warn,
                error: console.error,
                info: console.info,
                debug: console.debug
            };
            
            // Override with empty functions
            console.log = function() {};
            console.warn = function() {};
            console.error = function() {};
            console.info = function() {};
            console.debug = function() {};
            
            // But allow errors to be reported silently
            window.addEventListener('error', function(e) {
                return true;
            });
        }

        // 4. Detect DevTools opening via debugger statement
        setInterval(function() {
            (function() {
                var start = Date.now();
                // @ts-ignore
                debugger;
                var end = Date.now();
                if (end - start > 100) {
                    // DevTools is likely open
                    // window.location.href = 'about:blank';
                }
            })();
        }, 2000);

        // 5. Prevent iframe embedding (clickjacking protection)
        if (window.top !== window.self) {
            window.top.location = window.self.location;
        }

        // 6. Override console.clear to prevent clearing console
        console.clear = function() {};

        // 7. Detect when console is opened using window.outerHeight/outerWidth trick
        (function detectDevTools() {
            var element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() {
                    return 'devtools-detected';
                }
            });
            console.log('%c', element);
        })();

        // 8. Override eval to prevent code injection
        const originalEval = window.eval;
        window.eval = function(code) {
            if (code && code.includes('console') && code.includes('log')) {
                return null;
            }
            return originalEval.call(this, code);
        };

        // 9. Block common DevTools shortcuts on the body
        document.body.addEventListener('keydown', function(e) {
            // Ctrl+Shift+C (Inspect Element)
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }
        });

        console.log('🔒 Security protection enabled');
    </script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // ============================================================
        // FIREBASE CONFIGURATION
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAJ3p91t83EQeQ6XopPfvisc1fIdsWIMm8",
            authDomain: "global-immigration-sc.firebaseapp.com",
            projectId: "global-immigration-sc",
            storageBucket: "global-immigration-sc.firebasestorage.app",
            messagingSenderId: "791181145117",
            appId: "1:791181145117:web:527b7df63c9a32adf9c2f4"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // ============================================================
        // CHECK IF ALREADY LOGGED IN
        // ============================================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
        
        // ============================================================
        // LOGIN FORM HANDLER
        // ============================================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const submitBtn = document.getElementById('loginBtn');
            
            errorDiv.style.display = 'none';
            
            if (!email || !password) {
                errorText.textContent = 'Please enter both email and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            submitBtn.disabled = true;
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Set persistence if "Remember me" is checked
                if (rememberMe) {
                    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                } else {
                    await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
                }
                
                // Check if user is admin (redirect to admin dashboard)
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists && userDoc.data().userType === 'admin') {
                    window.location.href = '../admin/dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                console.error('Login error:', error);
                
                let message = 'Login failed. Please try again.';
                switch (error.code) {
                    case 'auth/user-not-found':
                        message = 'No account found with this email address';
                        break;
                    case 'auth/wrong-password':
                        message = 'Incorrect password. Please try again.';
                        break;
                    case 'auth/invalid-email':
                        message = 'Please enter a valid email address.';
                        break;
                    case 'auth/user-disabled':
                        message = 'This account has been disabled. Please contact support.';
                        break;
                    case 'auth/too-many-requests':
                        message = 'Too many failed attempts. Please try again later.';
                        break;
                    default:
                        message = error.message || 'Login failed. Please try again.';
                }
                
                errorText.textContent = message;
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
        
        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
