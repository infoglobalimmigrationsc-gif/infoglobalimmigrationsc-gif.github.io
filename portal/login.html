<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Global Immigration SC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/glass-system.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header img {
            max-width: 120px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .form-footer a {
            color: var(--primary-red);
            text-decoration: none;
        }
        .error-message {
            background: rgba(227,6,19,0.1);
            color: var(--primary-red);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="glass-card login-container" style="padding: 40px;">
        <div class="login-header">
            <img src="../GISC-LOGO.png" alt="Logo" onerror="this.src='https://placehold.co/120x120/E30613/white?text=GISC'">
            <h2>Welcome Back</h2>
            <p>Login to access your application portal</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" class="glass-input" placeholder="you@example.com" required style="width: 100%;">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" class="glass-input" placeholder="••••••••" required style="width: 100%;">
            </div>
            
            <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                <label style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a href="forgot-password.html" style="color: var(--primary-red);">Forgot Password?</a>
            </div>
            
            <button type="submit" class="glass-btn glass-btn-primary" style="width: 100%; padding: 14px;">
                <span class="btn-text">Login to Dashboard</span>
                <span class="loading-spinner" style="display: none;"></span>
            </button>
        </form>
        
        <div class="form-footer">
            <p>Don't have an account? <a href="register.html">Create Account</a></p>
            <p><a href="../index.html">← Back to Home</a></p>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase Config (move to config file in production)
        const firebaseConfig = {
            apiKey: "AIzaSyAJ3p91t83EQeQ6XopPfvisc1fIdsWIMm8",
            authDomain: "global-immigration-sc.firebaseapp.com",
            projectId: "global-immigration-sc",
            storageBucket: "global-immigration-sc.firebasestorage.app",
            messagingSenderId: "791181145117",
            appId: "1:791181145117:web:527b7df63c9a32adf9c2f4"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        
        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
        
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const btnText = submitBtn.querySelector('.btn-text');
            const spinner = submitBtn.querySelector('.loading-spinner');
            
            errorDiv.style.display = 'none';
            btnText.textContent = 'Logging in...';
            spinner.style.display = 'inline-block';
            submitBtn.disabled = true;
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                
                // Check if user is admin (redirect to admin dashboard)
                const userDoc = await firebase.firestore().collection('users').doc(userCredential.user.uid).get();
                if (userDoc.exists && userDoc.data().userType === 'admin') {
                    window.location.href = '../admin/dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = error.message === 'auth/user-not-found' ? 'No account found with this email' :
                                        error.message === 'auth/wrong-password' ? 'Incorrect password' :
                                        error.message === 'auth/invalid-email' ? 'Invalid email address' :
                                        'Login failed. Please try again.';
            } finally {
                btnText.textContent = 'Login to Dashboard';
                spinner.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
