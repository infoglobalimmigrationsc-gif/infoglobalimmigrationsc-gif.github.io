    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Global Immigration SC</title>
    <meta name="description" content="Register for your Global Immigration SC account to start your study abroad or immigration journey.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #E30613;
            --primary-red-dark: #b30000;
            --dark-gray: #333333;
            --medium-gray: #777777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
        }

        .register-container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header img {
            max-width: 100px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .register-header h2 {
            color: white;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        .register-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: white;
            font-size: 0.9rem;
        }

        .form-group label .required {
            color: var(--primary-red);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .glass-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            font-size: 1rem;
            transition: all 0.3s ease;
            color: var(--dark-gray);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .glass-input:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.15);
        }

        .glass-input::placeholder {
            color: #999;
        }

        .glass-input option {
            color: var(--dark-gray);
        }

        .password-strength {
            margin-top: 8px;
        }

        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .strength-text {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .strength-weak .strength-fill { background: #dc3545; width: 33%; }
        .strength-medium .strength-fill { background: #ffc107; width: 66%; }
        .strength-strong .strength-fill { background: #28a745; width: 100%; }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-red);
        }

        .checkbox-group label {
            margin: 0;
            font-weight: normal;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .checkbox-group a {
            color: var(--primary-red);
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--primary-red);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            background: var(--primary-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(227, 6, 19, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(227, 6, 19, 0.15);
            border-left: 3px solid var(--primary-red);
            color: var(--primary-red);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
        }

        .error-message i {
            margin-right: 8px;
        }

        .success-message {
            background: rgba(40, 167, 69, 0.15);
            border-left: 3px solid #28a745;
            color: #28a745;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
        }

        .success-message i {
            margin-right: 8px;
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-footer p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .form-footer a {
            color: var(--primary-red);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .form-footer .back-home {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .form-footer .back-home:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-footer-copyright {
            margin-top: 12px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Responsive */
        @media (max-width: 550px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .register-container {
                padding: 25px;
            }
            .register-header h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

    <!-- ============ ANTI-CONSOLE & SECURITY PROTECTION ============ -->
    <script>
        // ============================================================
        // ANTI-CONSOLE PROTECTION - Prevents hackers from using DevTools
        // ============================================================
        
        // 1. Disable right-click context menu
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // 2. Disable common keyboard shortcuts for DevTools
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I (Inspect)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+J (Console)
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+U (View Source)
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+S (Save Page)
            if (e.ctrlKey && (e.key === 'S' || e.key === 's')) {
                e.preventDefault();
                return false;
            }
        });

        // 3. Disable console.log, console.warn, console.error - but keep for debugging
        // Only disable in production to prevent hackers from seeing sensitive info
        if (window.location.hostname !== 'localhost' && !window.location.hostname.includes('127.0.0.1')) {
            // Store original console methods
            const originalConsole = {
                log: console.log,
                warn: console.warn,
                error: console.error,
                info: console.info,
                debug: console.debug
            };
            
            // Override with empty functions
            console.log = function() {};
            console.warn = function() {};
            console.error = function() {};
            console.info = function() {};
            console.debug = function() {};
            
            // But allow errors to be reported silently
            window.addEventListener('error', function(e) {
                return true;
            });
        }

        // 4. Detect DevTools opening via debugger statement
        setInterval(function() {
            (function() {
                var start = Date.now();
                // @ts-ignore
                debugger;
                var end = Date.now();
                if (end - start > 100) {
                    // DevTools is likely open
                    // window.location.href = 'about:blank';
                }
            })();
        }, 2000);

        // 5. Prevent iframe embedding (clickjacking protection)
        if (window.top !== window.self) {
            window.top.location = window.self.location;
        }

        // 6. Override console.clear to prevent clearing console
        console.clear = function() {};

        // 7. Detect when console is opened using window.outerHeight/outerWidth trick
        (function detectDevTools() {
            var element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() {
                    return 'devtools-detected';
                }
            });
            console.log('%c', element);
        })();

        // 8. Override eval to prevent code injection
        const originalEval = window.eval;
        window.eval = function(code) {
            if (code && code.includes('console') && code.includes('log')) {
                return null;
            }
            return originalEval.call(this, code);
        };

        // 9. Block common DevTools shortcuts on the body
        document.body.addEventListener('keydown', function(e) {
            // Ctrl+Shift+C (Inspect Element)
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }
        });

        console.log('🔒 Security protection enabled');
    </script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <script>
        // ============================================================
        // FIREBASE CONFIGURATION
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAJ3p91t83EQeQ6XopPfvisc1fIdsWIMm8",
            authDomain: "global-immigration-sc.firebaseapp.com",
            projectId: "global-immigration-sc",
            storageBucket: "global-immigration-sc.firebasestorage.app",
            messagingSenderId: "791181145117",
            appId: "1:791181145117:web:527b7df63c9a32adf9c2f4"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        
        // ============================================================
        // API URL
        // ============================================================
        const API_URL = 'https://gisc-app-production.up.railway.app/api';
        
        // ============================================================
        // PASSWORD STRENGTH CHECKER
        // ============================================================
        const passwordInput = document.getElementById('password');
        const strengthDiv = document.getElementById('passwordStrength');
        
        function checkPasswordStrength(password) {
            if (!password) {
                strengthDiv.className = 'password-strength';
                strengthDiv.querySelector('.strength-text').textContent = '';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z\d]/.test(password)) strength++;
            
            strengthDiv.classList.remove('strength-weak', 'strength-medium', 'strength-strong');
            
            if (strength <= 2) {
                strengthDiv.classList.add('strength-weak');
                strengthDiv.querySelector('.strength-text').textContent = 'Weak password';
                strengthDiv.querySelector('.strength-text').style.color = '#dc3545';
            } else if (strength <= 4) {
                strengthDiv.classList.add('strength-medium');
                strengthDiv.querySelector('.strength-text').textContent = 'Medium password';
                strengthDiv.querySelector('.strength-text').style.color = '#ffc107';
            } else {
                strengthDiv.classList.add('strength-strong');
                strengthDiv.querySelector('.strength-text').textContent = 'Strong password';
                strengthDiv.querySelector('.strength-text').style.color = '#28a745';
            }
        }
        
        passwordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });
        
        // ============================================================
        // PASSWORD MATCH VALIDATION
        // ============================================================
        const confirmInput = document.getElementById('confirmPassword');
        
        function validatePasswordMatch() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            if (confirm && password !== confirm) {
                confirmInput.style.borderColor = '#dc3545';
                return false;
            } else {
                confirmInput.style.borderColor = 'rgba(255, 255, 255, 0.4)';
                return true;
            }
        }
        
        confirmInput.addEventListener('input', validatePasswordMatch);
        passwordInput.addEventListener('input', validatePasswordMatch);
        
        // ============================================================
        // FORM SUBMISSION
        // ============================================================
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const dob = document.getElementById('dob').value;
            const citizenship = document.getElementById('citizenship').value;
            const country = document.getElementById('country').value;
            const referral = document.getElementById('referral').value;
            const password = passwordInput.value;
            const confirmPassword = confirmInput.value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            const receiveUpdates = document.getElementById('receiveUpdates').checked;
            
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successDiv = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            const submitBtn = document.getElementById('submitBtn');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Validation
            if (!fullName) {
                errorText.textContent = 'Please enter your full name';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!email) {
                errorText.textContent = 'Please enter your email address';
                errorDiv.style.display = 'block';
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorText.textContent = 'Please enter a valid email address';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!password || password.length < 6) {
                errorText.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                errorText.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!country) {
                errorText.textContent = 'Please select your country of interest';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!agreeTerms) {
                errorText.textContent = 'You must agree to the Terms of Service and Privacy Policy';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Show loading state
            submitBtn.innerHTML = '<span class="spinner"></span> Creating Account...';
            submitBtn.disabled = true;
            
            try {
                // 1. Create user in Firebase Authentication
                console.log('📤 Creating Firebase user...');
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                const uid = user.uid;
                
                // 2. Update Firebase profile
                await user.updateProfile({ displayName: fullName });
                console.log('✅ Firebase user created:', uid);
                
                // 3. Send verification email
                await user.sendEmailVerification();
                console.log('✅ Verification email sent');
                
                // 4. Create user in MongoDB
                const userData = {
                    uid: uid,
                    name: fullName,
                    email: email,
                    phone: phone || '',
                    whatsapp: whatsapp || phone || '',
                    dob: dob || '',
                    citizenship: citizenship || '',
                    countryOfInterest: country,
                    referral: referral || '',
                    receiveUpdates: receiveUpdates,
                    userType: 'applicant',
                    accountStatus: 'active'
                };
                
                console.log('📤 Creating MongoDB user:', userData);
                
                const response = await fetch(`${API_URL}/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const result = await response.json();
                console.log('📥 MongoDB response:', result);
                
                if (!response.ok || !result.success) {
                    console.warn('⚠️ MongoDB user creation warning:', result.message);
                } else {
                    console.log('✅ MongoDB user created successfully');
                }
                
                // 5. Send welcome notification
                try {
                    const formData = new FormData();
                    formData.append('form_type', 'user_registration');
                    formData.append('user_name', fullName);
                    formData.append('user_email', email);
                    formData.append('user_phone', phone);
                    formData.append('country_interest', country);
                    formData.append('registration_date', new Date().toISOString());
                    formData.append('_subject', `New User Registration: ${fullName}`);
                    
                    await fetch('https://formspree.io/f/mrbaejkr', {
                        method: 'POST',
                        body: formData,
                        headers: { 'Accept': 'application/json' }
                    }).catch(err => console.log('Formspree notification error:', err));
                } catch (notifError) {
                    console.log('Notification error (non-critical):', notifError);
                }
                
                // 6. Show success message
                successText.innerHTML = 'Account created successfully! Redirecting to dashboard...';
                successDiv.style.display = 'block';
                
                // 7. Redirect to dashboard after 2 seconds
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('❌ Registration error:', error);
                
                let message = 'Registration failed. Please try again.';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        message = 'An account already exists with this email address. Please login instead.';
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 3000);
                        break;
                    case 'auth/invalid-email':
                        message = 'Please enter a valid email address.';
                        break;
                    case 'auth/weak-password':
                        message = 'Password is too weak. Please use at least 6 characters.';
                        break;
                    case 'auth/operation-not-allowed':
                        message = 'Email/password accounts are not enabled. Please contact support.';
                        break;
                    default:
                        message = error.message || 'Registration failed. Please try again.';
                }
                
                errorText.textContent = message;
                errorDiv.style.display = 'block';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorDiv.innerHTML += `<p style="margin-top: 10px;"><a href="login.html" style="color: #E30613; font-weight: 600;">Click here to login</a></p>`;
                }
                
            } finally {
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                submitBtn.disabled = false;
            }
        });
        
        // ============================================================
        // CHECK IF USER IS ALREADY LOGGED IN
        // ============================================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
