<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Global Immigration SC</title>
    <meta name="description" content="Register for your Global Immigration SC account to start your study abroad or immigration journey.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/glass-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .register-container {
            max-width: 550px;
            width: 100%;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header img {
            max-width: 100px;
            margin-bottom: 15px;
        }
        
        .register-header h2 {
            color: var(--dark-gray);
            margin-bottom: 5px;
        }
        
        .register-header p {
            color: var(--medium-gray);
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark-gray);
            font-size: 0.9rem;
        }
        
        .form-group label .required {
            color: var(--primary-red);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .password-strength {
            margin-top: 8px;
        }
        
        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .strength-text {
            font-size: 0.7rem;
            color: #666;
        }
        
        .strength-weak .strength-fill { background: #dc3545; width: 33%; }
        .strength-medium .strength-fill { background: #ffc107; width: 66%; }
        .strength-strong .strength-fill { background: #28a745; width: 100%; }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }
        
        .checkbox-group a {
            color: var(--primary-red);
            text-decoration: none;
        }
        
        .checkbox-group a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(227, 6, 19, 0.1);
            border-left: 3px solid var(--primary-red);
            color: var(--primary-red);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
        }
        
        .success-message {
            background: rgba(40, 167, 69, 0.1);
            border-left: 3px solid #28a745;
            color: #28a745;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .form-footer p {
            color: var(--medium-gray);
            font-size: 0.85rem;
        }
        
        .form-footer a {
            color: var(--primary-red);
            text-decoration: none;
            font-weight: 600;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        /* Loading button state */
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-loading .btn-text {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-loading .btn-text::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 550px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            
            .register-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card register-container" style="padding: 40px;">
        <div class="register-header">
            <img src="../GISC-LOGO.png" alt="Global Immigration SC Logo" onerror="this.src='https://placehold.co/100x100/E30613/white?text=GISC'">
            <h2>Create Your Account</h2>
            <p>Start your journey to study, work, or live abroad</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="fullName" class="glass-input" placeholder="John Doe" required style="width: 100%;">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" class="glass-input" style="width: 100%;">
                </div>
            </div>
            
            <div class="form-group">
                <label>Email Address <span class="required">*</span></label>
                <input type="email" id="email" class="glass-input" placeholder="you@example.com" required style="width: 100%;">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" class="glass-input" placeholder="+1234567890" style="width: 100%;">
                </div>
                <div class="form-group">
                    <label>WhatsApp (Optional)</label>
                    <input type="tel" id="whatsapp" class="glass-input" placeholder="Same as phone" style="width: 100%;">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" id="password" class="glass-input" placeholder="Create a strong password" required style="width: 100%;">
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar">
                            <div class="strength-fill"></div>
                        </div>
                        <div class="strength-text"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password <span class="required">*</span></label>
                    <input type="password" id="confirmPassword" class="glass-input" placeholder="Confirm your password" required style="width: 100%;">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Country of Citizenship</label>
                    <select id="citizenship" class="glass-input" style="width: 100%;">
                        <option value="">Select Country</option>
                        <option value="Liberia">Liberia</option>
                        <option value="USA">United States</option>
                        <option value="Canada">Canada</option>
                        <option value="UK">United Kingdom</option>
                        <option value="Nigeria">Nigeria</option>
                        <option value="Ghana">Ghana</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Country of Interest <span class="required">*</span></label>
                    <select id="country" class="glass-input" required style="width: 100%;">
                        <option value="">Select Destination</option>
                        <option value="USA">🇺🇸 United States</option>
                        <option value="Canada">🇨🇦 Canada</option>
                        <option value="UK">🇬🇧 United Kingdom</option>
                        <option value="Australia">🇦🇺 Australia</option>
                        <option value="Germany">🇩🇪 Germany</option>
                        <option value="France">🇫🇷 France</option>
                        <option value="Netherlands">🇳🇱 Netherlands</option>
                        <option value="Sweden">🇸🇪 Sweden</option>
                        <option value="Ireland">🇮🇪 Ireland</option>
                        <option value="UAE">🇦🇪 UAE</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>How did you hear about us?</label>
                <select id="referral" class="glass-input" style="width: 100%;">
                    <option value="">Select an option</option>
                    <option value="facebook">Facebook</option>
                    <option value="instagram">Instagram</option>
                    <option value="linkedin">LinkedIn</option>
                    <option value="whatsapp">WhatsApp</option>
                    <option value="friend">Friend/Family</option>
                    <option value="google">Google Search</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="agreeTerms" required>
                <label>
                    I agree to the <a href="#" target="_blank">Terms of Service</a> and 
                    <a href="#" target="_blank">Privacy Policy</a> <span class="required">*</span>
                </label>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="receiveUpdates" checked>
                <label>Receive updates about visa deadlines, scholarships, and opportunities</label>
            </div>
            
            <button type="submit" class="glass-btn glass-btn-primary" id="submitBtn" style="width: 100%; padding: 14px; font-size: 1rem;">
                <span class="btn-text"><i class="fas fa-user-plus"></i> Create Account</span>
                <span class="loading-spinner" style="display: none;"></span>
            </button>
        </form>
        
        <div class="form-footer">
            <p>Already have an account? <a href="login.html">Sign In</a></p>
            <p style="margin-top: 10px;">
                <a href="../index.html">← Back to Home</a>
            </p>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAJ3p91t83EQeQ6XopPfvisc1fIdsWIMm8",
            authDomain: "global-immigration-sc.firebaseapp.com",
            projectId: "global-immigration-sc",
            storageBucket: "global-immigration-sc.firebasestorage.app",
            messagingSenderId: "791181145117",
            appId: "1:791181145117:web:527b7df63c9a32adf9c2f4"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthDiv = document.getElementById('passwordStrength');
        
        function checkPasswordStrength(password) {
            if (!password) {
                strengthDiv.className = 'password-strength';
                strengthDiv.querySelector('.strength-text').textContent = '';
                return;
            }
            
            let strength = 0;
            
            // Length check
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            
            // Character variety
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z\d]/.test(password)) strength++;
            
            // Determine strength level
            strengthDiv.classList.remove('strength-weak', 'strength-medium', 'strength-strong');
            
            if (strength <= 2) {
                strengthDiv.classList.add('strength-weak');
                strengthDiv.querySelector('.strength-text').textContent = 'Weak password';
                strengthDiv.querySelector('.strength-text').style.color = '#dc3545';
            } else if (strength <= 4) {
                strengthDiv.classList.add('strength-medium');
                strengthDiv.querySelector('.strength-text').textContent = 'Medium password';
                strengthDiv.querySelector('.strength-text').style.color = '#ffc107';
            } else {
                strengthDiv.classList.add('strength-strong');
                strengthDiv.querySelector('.strength-text').textContent = 'Strong password';
                strengthDiv.querySelector('.strength-text').style.color = '#28a745';
            }
        }
        
        passwordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });
        
        // Real-time password match validation
        const confirmInput = document.getElementById('confirmPassword');
        
        function validatePasswordMatch() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            
            if (confirm && password !== confirm) {
                confirmInput.style.borderColor = '#dc3545';
                return false;
            } else {
                confirmInput.style.borderColor = 'rgba(255,255,255,0.4)';
                return true;
            }
        }
        
        confirmInput.addEventListener('input', validatePasswordMatch);
        passwordInput.addEventListener('input', validatePasswordMatch);
        
        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const dob = document.getElementById('dob').value;
            const citizenship = document.getElementById('citizenship').value;
            const country = document.getElementById('country').value;
            const referral = document.getElementById('referral').value;
            const password = passwordInput.value;
            const confirmPassword = confirmInput.value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            const receiveUpdates = document.getElementById('receiveUpdates').checked;
            
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = submitBtn.querySelector('.btn-text');
            const spinner = submitBtn.querySelector('.loading-spinner');
            
            // Reset messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Validation
            if (!fullName) {
                errorDiv.textContent = 'Please enter your full name';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!email) {
                errorDiv.textContent = 'Please enter your email address';
                errorDiv.style.display = 'block';
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.textContent = 'Please enter a valid email address';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!password) {
                errorDiv.textContent = 'Please create a password';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!country) {
                errorDiv.textContent = 'Please select your country of interest';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!agreeTerms) {
                errorDiv.textContent = 'You must agree to the Terms of Service and Privacy Policy';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Show loading state
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';
            submitBtn.disabled = true;
            submitBtn.classList.add('btn-loading');
            
            try {
                // Check if email already exists
                const existingUser = await auth.fetchSignInMethodsForEmail(email);
                if (existingUser.length > 0) {
                    throw new Error('An account already exists with this email address');
                }
                
                // Create user account
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Update profile with display name
                await user.updateProfile({
                    displayName: fullName
                });
                
                // Create user document in Firestore
                const userData = {
                    name: fullName,
                    email: email,
                    phone: phone || '',
                    whatsapp: whatsapp || phone || '',
                    dob: dob || '',
                    citizenship: citizenship || '',
                    countryOfInterest: country,
                    referral: referral || '',
                    receiveUpdates: receiveUpdates,
                    userType: 'applicant',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    emailVerified: false,
                    accountStatus: 'active'
                };
                
                await db.collection('users').doc(user.uid).set(userData);
                
                // Create application document
                const applicationData = {
                    userId: user.uid,
                    status: 'draft',
                    progress: 0,
                    currentStep: 'personal_info',
                    personalInfo: {
                        name: fullName,
                        email: email,
                        phone: phone || '',
                        countryOfInterest: country
                    },
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    documents: {},
                    payments: [],
                    notifications: [],
                    applicationStages: {
                        personal_info: { completed: true, status: 'completed', completedAt: new Date() },
                        document_upload: { completed: false, status: 'pending' },
                        payment: { completed: false, status: 'pending' },
                        review: { completed: false, status: 'pending' },
                        approval: { completed: false, status: 'pending' }
                    }
                };
                
                await db.collection('applications').doc(user.uid).set(applicationData);
                
                // Send welcome email via Formspree notification
                const formData = new FormData();
                formData.append('form_type', 'user_registration');
                formData.append('user_name', fullName);
                formData.append('user_email', email);
                formData.append('user_phone', phone);
                formData.append('country_interest', country);
                formData.append('registration_date', new Date().toISOString());
                formData.append('_subject', `New User Registration: ${fullName}`);
                
                await fetch('https://formspree.io/f/mrbaejkr', {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                }).catch(err => console.log('Formspree notification error:', err));
                
                // Show success message
                successDiv.innerHTML = `
                    <i class="fas fa-check-circle"></i> 
                    Account created successfully! Redirecting to dashboard...
                `;
                successDiv.style.display = 'block';
                
                // Send verification email
                await user.sendEmailVerification();
                
                // Redirect to dashboard after 2 seconds
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('Registration error:', error);
                
                let errorMessage = 'Registration failed. Please try again.';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'An account already exists with this email address. Please login instead.';
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 3000);
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Please enter a valid email address.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Password is too weak. Please use at least 6 characters with letters and numbers.';
                        break;
                    case 'auth/operation-not-allowed':
                        errorMessage = 'Email/password accounts are not enabled. Please contact support.';
                        break;
                    default:
                        errorMessage = error.message || 'Registration failed. Please try again.';
                }
                
                errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${errorMessage}`;
                errorDiv.style.display = 'block';
                
                // If email exists, show login link
                if (error.code === 'auth/email-already-in-use') {
                    errorDiv.innerHTML += `<p style="margin-top: 10px;"><a href="login.html" style="color: var(--primary-red);">Click here to login</a></p>`;
                }
                
            } finally {
                // Reset button state
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.classList.remove('btn-loading');
            }
        });
        
        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is already logged in, redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
