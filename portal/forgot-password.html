<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Global Immigration SC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #E30613;
            --primary-red-dark: #b30000;
            --dark-gray: #333333;
            --medium-gray: #777777;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
        }

        .forgot-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .forgot-header img {
            max-width: 100px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .forgot-header h2 {
            color: white;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        .forgot-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: white;
            font-size: 0.9rem;
        }

        .form-group label i {
            color: var(--primary-red);
            margin-right: 5px;
        }

        .glass-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            font-size: 1rem;
            transition: all 0.3s ease;
            color: var(--dark-gray);
        }

        .glass-input:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.15);
        }

        .glass-input::placeholder {
            color: #999;
        }

        .info-message {
            background: rgba(52, 152, 219, 0.15);
            border-left: 3px solid #3498db;
            color: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .info-message i {
            color: #3498db;
            font-size: 1.2rem;
            margin-top: 2px;
        }

        .info-message strong {
            color: white;
        }

        .error-message {
            background: rgba(227, 6, 19, 0.15);
            border-left: 3px solid var(--primary-red);
            color: var(--primary-red);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
            align-items: center;
            gap: 10px;
        }

        .error-message i {
            font-size: 1rem;
        }

        .success-message {
            background: rgba(40, 167, 69, 0.15);
            border-left: 3px solid #28a745;
            color: #28a745;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
            align-items: center;
            gap: 10px;
        }

        .success-message i {
            font-size: 1rem;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--primary-red);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            background: var(--primary-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(227, 6, 19, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-footer p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .form-footer a {
            color: var(--primary-red);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .form-footer .back-home {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .form-footer .back-home:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .form-footer-copyright {
            margin-top: 12px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        @media (max-width: 550px) {
            .forgot-container { padding: 25px; }
            .forgot-header h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-header">
            <img src="../GISC-LOGO.webp" alt="Global Immigration SC Logo" onerror="this.src='https://placehold.co/100x100/E30613/white?text=GISC'">
            <h2>Forgot Password?</h2>
            <p>Enter your email to receive a password reset link</p>
        </div>

        <div class="info-message">
            <i class="fas fa-info-circle"></i>
            <div>
                <strong>📌 Password Reset:</strong> We'll send a password reset link to your email. 
                The link will expire in 1 hour.
            </div>
        </div>

        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>

        <!-- Reset Form -->
        <form id="resetForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" class="glass-input" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </form>

        <div class="form-footer">
            <p><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
            <p style="margin-top: 8px;">
                Don't have an account? <a href="register.html">Sign Up</a>
            </p>
            <p style="margin-top: 8px;">
                <a href="../index.html" class="back-home">← Back to Home</a>
            </p>
            <p class="form-footer-copyright">© 2024 Global Immigration SC</p>
        </div>
    </div>

    <script>
        // ============================================================
        // API BASE URL - Use your Railway URL
        // ============================================================
        const API_BASE_URL = 'https://gisc-app-production.up.railway.app';

        // ============================================================
        // DOM ELEMENTS
        // ============================================================
        const resetForm = document.getElementById('resetForm');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successDiv = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const submitBtn = document.getElementById('submitBtn');
        const emailInput = document.getElementById('email');

        // ============================================================
        // SEND PASSWORD RESET - USING YOUR BACKEND API
        // ============================================================
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!email) {
                errorText.textContent = 'Please enter your email address';
                errorDiv.style.display = 'flex';
                return;
            }

            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner"></span> Sending...';
            submitBtn.disabled = true;

            try {
                // Call your backend API on Railway
                const response = await fetch(`${API_BASE_URL}/api/users/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (data.success) {
                    successText.textContent = `✅ Password reset link sent to ${email}! Please check your email.`;
                    successDiv.style.display = 'flex';
                    emailInput.value = '';
                    
                    // Show debug link in console (remove in production)
                    if (data.debugLink) {
                        console.log('🔗 Reset link:', data.debugLink);
                    }
                } else {
                    errorText.textContent = data.message || 'Failed to send reset link. Please try again.';
                    errorDiv.style.display = 'flex';
                }

            } catch (error) {
                console.error('Password reset error:', error);
                errorText.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'flex';
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                resetForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
