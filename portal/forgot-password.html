<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Global Immigration SC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #E30613;
            --primary-red-dark: #b30000;
            --dark-gray: #333333;
            --medium-gray: #777777;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
        }

        .forgot-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .forgot-header img {
            max-width: 100px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .forgot-header h2 {
            color: white;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        .forgot-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: white;
            font-size: 0.9rem;
        }

        .form-group label i {
            color: var(--primary-red);
            margin-right: 5px;
        }

        .glass-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            font-size: 1rem;
            transition: all 0.3s ease;
            color: var(--dark-gray);
        }

        .glass-input:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 0 3px rgba(227, 6, 19, 0.15);
        }

        .glass-input::placeholder {
            color: #999;
        }

        .info-message {
            background: rgba(52, 152, 219, 0.15);
            border-left: 3px solid #3498db;
            color: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .info-message i {
            color: #3498db;
            font-size: 1.2rem;
            margin-top: 2px;
        }

        .info-message strong {
            color: white;
        }

        .error-message {
            background: rgba(227, 6, 19, 0.15);
            border-left: 3px solid var(--primary-red);
            color: var(--primary-red);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
            align-items: center;
            gap: 10px;
        }

        .error-message i {
            font-size: 1rem;
        }

        .success-message {
            background: rgba(40, 167, 69, 0.15);
            border-left: 3px solid #28a745;
            color: #28a745;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
            align-items: center;
            gap: 10px;
        }

        .success-message i {
            font-size: 1rem;
        }

        /* Reset Link Display Box */
        .reset-link-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .reset-link-box .link-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .reset-link-box .link-url {
            color: #4fc3f7;
            font-size: 0.8rem;
            word-break: break-all;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 12px;
            border-radius: 6px;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-link-box .link-url:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .reset-link-box .copy-btn {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .reset-link-box .copy-btn:hover {
            background: var(--primary-red-dark);
        }

        .reset-link-box .warning-text {
            color: #ffc107;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--primary-red);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            background: var(--primary-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(227, 6, 19, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-footer p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .form-footer a {
            color: var(--primary-red);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .form-footer .back-home {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .form-footer .back-home:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .form-footer-copyright {
            margin-top: 12px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        @media (max-width: 550px) {
            .forgot-container { padding: 25px; }
            .forgot-header h2 { font-size: 1.3rem; }
            .reset-link-box .link-url { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-header">
            <img src="../GISC-LOGO.webp" alt="Global Immigration SC Logo" onerror="this.src='https://placehold.co/100x100/E30613/white?text=GISC'">
            <h2>Forgot Password?</h2>
            <p>Enter your email to receive a password reset link</p>
        </div>

        <div class="info-message">
            <i class="fas fa-info-circle"></i>
            <div>
                <strong>📌 Password Reset:</strong> We'll send a password reset link to your email. 
                The link will expire in 1 hour.
            </div>
        </div>

        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>

        <!-- Reset Form -->
        <form id="resetForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" class="glass-input" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </form>

        <div class="form-footer">
            <p><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
            <p style="margin-top: 8px;">
                Don't have an account? <a href="register.html">Sign Up</a>
            </p>
            <p style="margin-top: 8px;">
                <a href="../index.html" class="back-home">← Back to Home</a>
            </p>
            <p class="form-footer-copyright">© 2024 Global Immigration SC</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script>
        // ============================================================
        // FIREBASE CONFIGURATION
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAJ3p91t83EQeQ6XopPfvisc1fIdsWIMm8",
            authDomain: "global-immigration-sc.firebaseapp.com",
            projectId: "global-immigration-sc",
            storageBucket: "global-immigration-sc.firebasestorage.app",
            messagingSenderId: "791181145117",
            appId: "1:791181145117:web:527b7df63c9a32adf9c2f4"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ============================================================
        // DOM ELEMENTS
        // ============================================================
        const resetForm = document.getElementById('resetForm');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successDiv = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const submitBtn = document.getElementById('submitBtn');
        const emailInput = document.getElementById('email');

        // ============================================================
        // SEND PASSWORD RESET - USING FIREBASE AUTH
        // ============================================================
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!email) {
                errorText.textContent = 'Please enter your email address';
                errorDiv.style.display = 'flex';
                return;
            }

            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner"></span> Sending...';
            submitBtn.disabled = true;

            try {
                // ============================================================
                // CRITICAL: Use Firebase Auth to send password reset email
                // This is the ONLY way that will sync with Firebase Auth
                // ============================================================
                const actionCodeSettings = {
    url: 'https://gisc-app-production.up.railway.app/portal/reset-password.html',
    handleCodeInApp: false
};

                await auth.sendPasswordResetEmail(email, actionCodeSettings);

                successText.textContent = `✅ Password reset link sent to ${email}! Please check your email.`;
                successDiv.style.display = 'flex';

                // Clear form
                emailInput.value = '';

            } catch (error) {
                console.error('Password reset error:', error);

                let message = 'Failed to send reset link. Please try again.';
                switch (error.code) {
                    case 'auth/user-not-found':
                        message = 'No account found with this email address. Please check and try again.';
                        break;
                    case 'auth/invalid-email':
                        message = 'Please enter a valid email address.';
                        break;
                    case 'auth/too-many-requests':
                        message = 'Too many attempts. Please wait a few minutes before trying again.';
                        break;
                    case 'auth/unauthorized-continue-uri':
                        message = 'Domain not authorized. Please contact support.';
                        break;
                    default:
                        message = error.message || 'Failed to send reset link. Please try again.';
                }

                errorText.textContent = message;
                errorDiv.style.display = 'flex';

                // If user not found, show link to register
                if (error.code === 'auth/user-not-found') {
                    errorDiv.innerHTML += `
                        <p style="margin-top: 10px;">
                            <a href="register.html" style="color: #E30613; font-weight: 600;">Create a new account</a>
                        </p>
                    `;
                }

            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                resetForm.dispatchEvent(new Event('submit'));
            }
        });

        // ============================================================
        // CHECK IF USER IS ALREADY LOGGED IN
        // ============================================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is logged in, redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
